<!doctype html>

    <title>FlexBox Photo Gallery</title>
  </head>
  <body>
    <h1>Flexbox Photo Gallery</h1>
    <style>
      h1 {
        text-align: center;
      }
      .gallery {
        background-color: khaki;
        border: 4px solid black;
        width: 90%;
        max-width: 1280px;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }
      figure {
        background-color: white;
        width: 100%;
        max-width: 250px;
        padding: 1rem;
        /* border-radius: 1rem; */
      }
      figcaption {
        text-align: center;
        color: gray;
        padding: 0.5rem;
      }
      img {
        width: 100%;
        aspect-ratio: 1 /1;
        /* border-radius: 1rem; */
      }
    </style>
    <div class="gallery">
      <figure>
